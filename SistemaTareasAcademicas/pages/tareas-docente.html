<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gestión de Tareas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand" href="#">
Sistema Académico
</a>

<div>

<a
href="dashboard-docente.html"
class="btn btn-light btn-sm">
Dashboard
</a>

<a
href="calificaciones.html"
class="btn btn-warning btn-sm">
Calificaciones
</a>

<a
href="index.html"
class="btn btn-danger btn-sm">
Cerrar Sesión
</a>

</div>

</div>

</nav>

<div class="container mt-4">

<h2>Crear Nueva Tarea</h2>

<div class="card shadow">

<div class="card-body">

<form id="formTarea">

<div class="mb-3">

<label>Título</label>

<input
type="text"
id="titulo"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Descripción</label>

<textarea
id="descripcion"
class="form-control"
rows="4"
required>
</textarea>

</div>

<div class="mb-3">

<label>Fecha Límite</label>

<input
type="date"
id="fechaLimite"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Curso</label>

<input
type="number"
id="idCurso"
class="form-control"
value="1"
required>

</div>

<button
type="submit"
class="btn btn-primary">

Crear Tarea

</button>

</form>

<div
id="mensaje"
class="mt-3">
</div>

</div>

</div>

</div>

<script>

document
.getElementById("formTarea")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

try{

const respuesta =
await fetch(
"http://localhost:5678/webhook/crear-tarea",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

titulo:
document.getElementById("titulo").value,

descripcion:
document.getElementById("descripcion").value,

fechaLimite:
document.getElementById("fechaLimite").value,

idCurso:
Number(
document.getElementById("idCurso").value
)

})

}
);

await respuesta.json();

document
.getElementById("mensaje")
.innerHTML =

`
<div class="alert alert-success">
Tarea creada correctamente
</div>
`;

document
.getElementById("formTarea")
.reset();

}
catch(error){

console.error(error);

document
.getElementById("mensaje")
.innerHTML =

`
<div class="alert alert-danger">
Error al crear tarea
</div>
`;

}

});

</script>

</body>
</html>
