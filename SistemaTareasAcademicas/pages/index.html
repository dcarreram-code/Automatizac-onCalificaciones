<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    Iniciar Sesión
                </div>

                <div class="card-body">

                    <form id="formLogin">

                        <div class="mb-3">

                            <label>Usuario</label>

                            <input
                                type="text"
                                class="form-control"
                                id="usuario"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Contraseña</label>

                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Ingresar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

document
.getElementById("formLogin")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const datos = {

        usuario:
        document.getElementById(
            "usuario"
        ).value,

        password:
        document.getElementById(
            "password"
        ).value

    };

    try{

        const respuesta =
        await fetch(
            "http://localhost:5678/webhook/login",
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:
                JSON.stringify(datos)
            }
        );

        const resultado =
        await respuesta.json();

        console.log(resultado);

        if(!resultado.success){

            alert(
                "Usuario o contraseña incorrectos"
            );

            return;
        }

        localStorage.setItem(
            "rol",
            resultado.rol
        );

        if(resultado.idEstudiante){

            localStorage.setItem(
                "idEstudiante",
                resultado.idEstudiante
            );

        }

        if(resultado.nombre){

            localStorage.setItem(
                "nombre",
                resultado.nombre
            );

        }

        if(resultado.rol === "Docente"){

            window.location.href =
            "dashboard-docente.html";

        }
        else{

            window.location.href =
            "dashboard-estudiante.html";

        }

    }
    catch(error){

        console.error(error);

        alert(
            "Error al iniciar sesión"
        );

    }

});

</script>

</body>
</html>
