<div class="container mt-4">

<h2>Panel del Docente</h2>

<div class="row mt-4">

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Tareas Recibidas</h5>
<h1 id="totalRecibidas">0</h1>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Pendientes</h5>
<h1 id="totalPendientes">0</h1>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Calificadas</h5>
<h1 id="totalCalificadas">0</h1>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Promedio</h5>
<h1 id="promedioGeneral">0</h1>
</div>
</div>
</div>

</div>

<div class="card mt-4 shadow">

<div class="card-header">
Últimas Entregas
</div>

<div class="card-body">

<table class="table table-hover">

<thead>
<tr>
<th>Alumno</th>
<th>Tarea</th>
<th>Fecha</th>
<th>Estado</th>
<th>Nota</th>
</tr>
</thead>

<tbody id="tablaEntregas">

</tbody>

</table>

</div>

</div>

</div>

<script>

async function cargarDashboard(){

    try{

        const respuesta = await fetch(
            "http://localhost:5678/webhook/dashboard-docente"
        );

        const datos = await respuesta.json();

        const entregas = datos.entregas;

        let pendientes = 0;
        let calificadas = 0;
        let sumaNotas = 0;
        let cantidadNotas = 0;

        const tabla =
        document.getElementById("tablaEntregas");

        tabla.innerHTML = "";

        entregas.forEach(entrega => {

            if(
                entrega.Estado === "PENDIENTE_CALIFICACION"
                ||
                entrega.Estado === "Recibida"
            ){
                pendientes++;
            }

            if(
                entrega.Estado === "CALIFICADA"
            ){
                calificadas++;
            }

            if(entrega.Nota != null){

                sumaNotas += Number(entrega.Nota);
                cantidadNotas++;

            }

            const fecha =
            new Date(entrega.FechaEntrega)
            .toLocaleDateString();

            let colorBadge = "bg-secondary";

            if(entrega.Estado === "CALIFICADA"){
                colorBadge = "bg-success";
            }

            if(
                entrega.Estado === "PENDIENTE_CALIFICACION"
                ||
                entrega.Estado === "Recibida"
            ){
                colorBadge = "bg-warning";
            }

            tabla.innerHTML += `
            <tr>
                <td>${entrega.Nombre}</td>
                <td>${entrega.Titulo}</td>
                <td>${fecha}</td>
                <td>
                    <span class="badge ${colorBadge}">
                        ${entrega.Estado}
                    </span>
                </td>
                <td>${entrega.Nota ?? "-"}</td>
            </tr>
            `;
        });

        document.getElementById(
            "totalRecibidas"
        ).textContent = entregas.length;

        document.getElementById(
            "totalPendientes"
        ).textContent = pendientes;

        document.getElementById(
            "totalCalificadas"
        ).textContent = calificadas;

        document.getElementById(
            "promedioGeneral"
        ).textContent =
        cantidadNotas > 0
        ? (sumaNotas / cantidadNotas).toFixed(0)
        : 0;

    }
    catch(error){

        console.error(error);

        alert(
            "Error al cargar dashboard"
        );

    }

}

cargarDashboard();

</script>

</body>
